# configs/models.yaml
#
# Add one entry per model you want to evaluate.
# Runtime resolves by model name from this file first, then applies any CLI overrides.
#
# backend options:
#   ollama  – local Ollama server (current setup)
#   vllm    – vLLM OpenAI-compatible endpoint (Eureka)

models:

  # ── Ollama (local) ────────────────────────────────────────────────────────
  - name: qwen2.5:7b
    backend: ollama
    base_url: http://localhost:11434/v1
    api_key: none

  - name: llama3.1:8b
    backend: ollama
    base_url: http://localhost:11434/v1
    api_key: none

  # ── vLLM on Eureka (fill in once the cluster is provisioned) ─────────────
  # vLLM is launched with:
  #   vllm serve <model_id> --host 0.0.0.0 --port 8000 --api-key <token>
  #
  # Then update base_url to the Eureka node address and set api_key.
  # No other code changes are needed — the runner uses the same OpenAI client.

  - name: meta-llama/Llama-3.1-8B-Instruct
    backend: vllm
    base_url: http://EUREKA_NODE:8000/v1   # <-- replace with real host
    api_key: $LLM_API_KEY                  # <-- replace or point at another env var like $EUREKA_API_TOKEN

  - name: Qwen/Qwen2.5-7B-Instruct
    backend: vllm
    base_url: http://EUREKA_NODE:8000/v1
    api_key: $LLM_API_KEY
