# configs/models.yaml
#
# Add one entry per model you want to evaluate.
# Runtime resolves by model name from this file first, then applies any CLI overrides.
# `base_url` and `api_key` may be literal values or env-var references like
# $LOCAL_OPENAI_BASE_URL and $LLM_API_KEY.
#
# backend options:
#   ollama  - local Ollama server (current setup)
#   openai  - OpenAI-compatible HTTP endpoint

models:

  # Local Ollama development / Eureka
  - name: qwen3:8b
    backend: ollama
    base_url: http://localhost:11434/v1
    api_key: ollama

  - name: qwen2.5:latest
    backend: ollama
    base_url: http://localhost:11434/v1
    api_key: ollama

  - name: gpt-oss:20b
    backend: ollama
    base_url: http://localhost:11434/v1
    api_key: ollama

  # Generic OpenAI-compatible endpoint example
  - name: openai-compatible-local
    backend: openai
    base_url: $LOCAL_OPENAI_BASE_URL
    api_key: $LLM_API_KEY
